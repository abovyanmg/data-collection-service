name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'admin/library/acs_data_library/**'
      - 'admin/docker/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: abovyanmg
  IMAGE_NAME: acs-upload-data

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify files exist
        run: |
          echo "Checking required files..."
          ls -la admin/docker/requirements.txt || echo "ERROR: requirements.txt not found"
          ls -la admin/docker/upload_main.py || echo "ERROR: upload_main.py not found"
          ls -la admin/library/acs_data_library/ || echo "ERROR: acs_data_library not found"
          echo "Files check complete"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./admin/docker/Dockerfile.upload_data
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: false

